name: renova_1
description: "Sistema de Control Clínico Profesional - Sanatorio"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  firebase_core: ^3.15.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.1.0
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.8
  
  # Routing
  go_router: ^13.2.0
  
  # Typography
  google_fonts: ^6.1.0
  
  # Icons
  lucide_flutter: ^1.16.0
  
  # Calendar
  table_calendar: ^3.1.0
  
  # Animations
  flutter_animate: ^4.5.0
  
  # Utilities
  uuid: ^4.3.3

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Charts
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Email
  mailer: ^6.1.2

  # Image Picker & Cache
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.14
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/login/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Logo de renova.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "Logo de renova.png"
